<!doctype html>
<html>
  <head>
    <style>
      .body-bg {
        background-color: #efefef;
      }
      h1 {
        color: #ff0000;
      }
      p {
        color: #333;
        font-size: 14px;
      }
      @media (max-width: 600px) {
        h1 {
          color: blue;
        }
      }
    </style>
  </head>
  <body class="body-bg">
    <table width="600">
      <tr>
        <td style="padding:16px">
          <h1>Heading via style block</h1>
          <p>Paragraph via style block.</p>
        </td>
      </tr>
    </table>
  </body>
</html>
