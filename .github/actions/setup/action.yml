name: Setup
description: Install Bun, restore install cache, and run bun install --frozen-lockfile

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
    - uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-
    - run: bun install --frozen-lockfile
      shell: bash
