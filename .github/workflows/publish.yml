name: Publish

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Use a PAT (CHANGESETS_PAT) so the Version Packages PR is pushed under
      # a real user identity instead of GITHUB_TOKEN. GitHub's anti-recursion
      # guard suppresses workflow runs triggered by GITHUB_TOKEN — without a
      # PAT, the CI workflow never fires on the VP PR and required-check
      # rules hold it in "Expected — Waiting for status" forever. With the
      # PAT, ci.yml fires normally; jobs detect the `changeset-release/*`
      # branch via their IS_VP env flag and no-op their work while still
      # reporting green.
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CHANGESETS_PAT }}
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Trigger marketing-site rebuild
        if: steps.changesets.outputs.published == 'true'
        env:
          DEPLOY_HOOK: ${{ secrets.TEMPLATICAL_COM_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "TEMPLATICAL_COM_DEPLOY_HOOK secret not set — skipping rebuild trigger."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK" -o /dev/null -w "HTTP %{http_code}\n"
